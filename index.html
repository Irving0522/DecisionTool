<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>決策小工具</title>
    <meta name="description" content="擲硬幣與擲骰子，快速做決定的好幫手">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-animated"></div>
    <div class="app-container glass-panel">
        <header>
            <h1>決策小工具</h1>
            <div class="tabs">
                <button class="tab-btn active" data-target="coin-section">擲硬幣</button>
                <button class="tab-btn" data-target="dice-section">擲骰子</button>
                <button class="tab-btn" data-target="poker-section">陪酒員</button>
            </div>
        </header>

        <main>
            <!-- 擲硬幣區塊 -->
            <section id="coin-section" class="tool-section active-section">
                <div class="coin-wrapper">
                    <div id="coin" class="coin">
                        <!-- 這是正面 (10圓數字面) -->
                        <div class="coin-face coin-front">
                            <div class="coin-inner-ring">
                                <span class="currency-value">10</span>
                            </div>
                        </div>
                        <!-- 這是反面 (拾圓人頭/圖像面) -->
                        <div class="coin-face coin-back">
                            <div class="coin-inner-ring">
                                <div class="portrait-placeholder"></div>
                                <span class="currency-text">拾圓</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="result-display" id="coin-result">準備擲硬幣...</div>
                <button id="flip-btn" class="btn-primary glow-effect">擲硬幣</button>
            </section>

            <!-- 陪酒員遊戲區塊 -->
            <section id="poker-section" class="tool-section">
                <div class="poker-card" id="poker-card">
                    <div class="card-inner">
                        <div class="card-front" id="card-front">
                            <div class="card-top-left"><span class="card-value"></span><span class="card-suit"></span></div>
                            <div class="card-center"><span class="card-suit-large"></span></div>
                            <div class="card-bottom-right"><span class="card-value"></span><span class="card-suit"></span></div>
                        </div>
                        <div class="card-back"></div>
                    </div>
                </div>
                <div class="rule-display" id="poker-rule">點擊抽牌開始遊戲</div>
                <div class="cards-left" id="cards-left">剩餘牌數：52</div>
                <button id="draw-card-btn" class="btn-primary glow-effect">抽牌</button>
                <button id="restart-poker-btn" class="btn-primary" style="display: none; margin-top: 10px; background: #475569;">重新開始</button>
            </section>

            <!-- 擲骰子區塊 -->
            <section id="dice-section" class="tool-section">
                <div class="config-row">
                    <label for="dice-count">骰子數量</label>
                    <div class="number-input">
                        <button id="dice-minus" class="icon-btn">-</button>
                        <input type="number" id="dice-count" min="1" max="10" value="1" readonly>
                        <button id="dice-plus" class="icon-btn">+</button>
                    </div>
                </div>
                <div class="dice-wrapper" id="dice-container">
                    <!-- 預設一顆骰子 -->
                    <div class="dice show-1">
                        <div class="dice-dot dot-1"></div>
                    </div>
                </div>
                <div class="result-display" id="dice-result">準備擲骰子...</div>
                <button id="roll-btn" class="btn-primary glow-effect">開始</button>
            </section>
        </main>
    </div>

    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 註冊成功'))
                    .catch(err => console.log('Service Worker 註冊失敗', err));
            });
        }
    </script>
</body>

</html>
